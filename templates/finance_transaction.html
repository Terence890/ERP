{% extends "base.html" %}
{% block title %}Financial Transaction{% endblock %}
{% block content %}
<div class="page-header">
  <h2>Record Financial Transaction</h2>
  <p class="muted">Create income or expense transactions (auto-generates journal entries)</p>
</div>

<div class="card" style="padding:16px;">
  <form method="post" style="display:flex;flex-direction:column;gap:8px;max-width:600px;">
    <label>Type</label>
    <select name="transaction_type">
      <option value="Income">Income</option>
      <option value="Expense">Expense</option>
    </select>

    <label>Amount</label>
    <input name="amount" type="number" step="0.01" placeholder="0.00" />

    <label>Debit Account</label>
    <select name="debit_account">
      {% for a in accounts %}<option value="{{ a.id }}">{{ a.name }} ({{ a.type }})</option>{% endfor %}
    </select>

    <label>Credit Account</label>
    <select name="credit_account">
      {% for a in accounts %}<option value="{{ a.id }}">{{ a.name }} ({{ a.type }})</option>{% endfor %}
    </select>

    <label>Description</label>
    <input name="description" />

    <div style="text-align:right;"><button class="btn primary" type="submit">Record Transaction</button></div>
  </form>
</div>

{% endblock %}
